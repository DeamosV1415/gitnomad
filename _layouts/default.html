<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% if page.title %}{{ page.title }} · GitNomad{% else %}GitNomad{% endif %}</title>
<meta name="description" content="{{ site.description }}">
<meta name="theme-color" content="#1B2A46">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1024 1024'><rect width='1024' height='1024' rx='228' fill='%231B2A46'/><path d='M282 742L282 282L742 742L742 282' fill='none' stroke='%23F4EFE4' stroke-width='66' stroke-linecap='round' stroke-linejoin='round'/><circle cx='742' cy='282' r='60' fill='%23221A39' stroke='%23F2A950' stroke-width='24'/><circle cx='742' cy='282' r='15' fill='%23F2A950'/></svg>">
<style>
  :root{
    color-scheme: dark;
    --sky-1:#16394D; --sky-2:#1B2A46; --sky-3:#221A39; --ink:#0B1322;
    --canvas:#F4EFE4; --muted:#AAB2C4; --faint:#7B849A;
    --beacon:#F2A950; --beacon-2:#F2C879; --green:#5BD08A; --red:#ff6b6b;
    --line: rgba(244,239,228,0.12); --panel: rgba(255,255,255,0.05);
    --sans: system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono: ui-monospace,"SF Mono","JetBrains Mono","Cascadia Code",Menlo,Consolas,monospace;
  }
  *,*::before,*::after{ box-sizing:border-box; }
  body{
    margin:0; font-family:var(--sans); color:var(--canvas); line-height:1.75;
    background:
      radial-gradient(900px 500px at 80% -10%, rgba(242,169,80,0.08), transparent 60%),
      linear-gradient(160deg, var(--sky-1), var(--sky-2) 55%, var(--sky-3));
    background-attachment: fixed; min-height:100vh; -webkit-font-smoothing:antialiased;
  }
  a{ color:var(--beacon); text-decoration:underline; text-underline-offset:2px; text-decoration-thickness:1px; }
  a:hover{ color:var(--beacon-2); }
  ::selection{ background:rgba(242,169,80,.28); color:#fff; }

  .nav{
    position:sticky; top:0; z-index:20; backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    background:rgba(11,19,34,.6); border-bottom:1px solid var(--line);
  }
  .nav-in{ max-width:900px; margin:0 auto; padding:0 24px; height:62px; display:flex; align-items:center; justify-content:space-between; }
  .brand{ display:flex; align-items:center; gap:10px; font-weight:700; font-size:16px; letter-spacing:-.01em; color:var(--canvas); text-decoration:none; }
  .brand svg{ width:28px; height:28px; border-radius:8px; }
  .nav-links{ display:flex; gap:22px; align-items:center; }
  .nav-links a{ color:var(--muted); font-size:14px; font-weight:500; text-decoration:none; }
  .nav-links a:hover{ color:var(--canvas); }
  .nav-cta{ color:var(--ink) !important; background:var(--canvas); padding:8px 14px; border-radius:9px; font-weight:600; }
  @media (max-width:640px){ .nav-links a.hide-sm{ display:none; } }

  .doc{ max-width:760px; margin:0 auto; padding:16px 24px 100px; }
  .crumb{ font-family:var(--mono); font-size:12px; letter-spacing:.06em; color:var(--faint); margin:26px 0 4px; text-transform:uppercase; }
  .crumb a{ color:var(--faint); text-decoration:none; }
  .crumb a:hover{ color:var(--canvas); }

  .doc h1{ font-size:clamp(28px,5vw,40px); line-height:1.1; letter-spacing:-.02em; margin:.2em 0 .6em; font-weight:800; }
  .doc h2{ font-size:25px; letter-spacing:-.01em; margin:2.2em 0 .7em; padding-top:1.1em; border-top:1px solid var(--line); font-weight:700; }
  .doc h3{ font-size:19px; margin:1.8em 0 .5em; font-weight:700; }
  .doc h4{ font-size:15px; margin:1.5em 0 .4em; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; font-family:var(--mono); }
  .doc p{ margin:0 0 1.05em; color:#E7E2D6; }
  .doc strong{ color:var(--canvas); font-weight:700; }
  .doc ul,.doc ol{ margin:0 0 1.15em; padding-left:1.35em; }
  .doc li{ margin:.4em 0; color:#E7E2D6; }
  .doc li::marker{ color:var(--beacon); }
  .doc hr{ border:0; border-top:1px solid var(--line); margin:2.6em 0; }

  .doc code{ font-family:var(--mono); font-size:.9em; background:var(--panel); border:1px solid var(--line); padding:.12em .45em; border-radius:6px; color:var(--beacon-2); }
  .doc pre{ background:#0d1017; border:1px solid var(--line); border-radius:12px; padding:16px 18px; overflow-x:auto; margin:0 0 1.3em; }
  .doc pre code{ background:none; border:0; padding:0; color:#d7dcea; font-size:13px; line-height:1.7; }

  .doc blockquote{ margin:0 0 1.3em; padding:12px 18px; border-left:3px solid var(--beacon); background:rgba(242,169,80,.06); border-radius:0 10px 10px 0; color:var(--muted); }
  .doc blockquote p{ margin:0; color:var(--muted); }

  .doc table{ width:100%; border-collapse:collapse; margin:0 0 1.4em; font-size:14.5px; display:block; overflow-x:auto; }
  .doc th,.doc td{ border:1px solid var(--line); padding:10px 13px; text-align:left; vertical-align:top; }
  .doc th{ background:var(--panel); font-weight:600; }

  footer{ border-top:1px solid var(--line); background:rgba(11,19,34,.5); }
  .foot-in{ max-width:760px; margin:0 auto; padding:30px 24px; display:flex; justify-content:space-between; gap:16px; flex-wrap:wrap; color:var(--faint); font-size:13px; }
  .foot-in a{ color:var(--muted); text-decoration:none; margin-left:18px; }
  .foot-in a:hover{ color:var(--canvas); }
  .foot-in .mono{ font-family:var(--mono); }
</style>
</head>
<body>
  <nav class="nav">
    <div class="nav-in">
      <a class="brand" href="{{ '/' | relative_url }}">
        <svg viewBox="0 0 1024 1024" aria-hidden="true"><defs><linearGradient id="g" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#16394D"/><stop offset="0.55" stop-color="#1B2A46"/><stop offset="1" stop-color="#221A39"/></linearGradient></defs><rect width="1024" height="1024" rx="228" fill="url(#g)"/><path d="M282 742L282 282L742 742L742 282" fill="#0B1322" stroke="#F4EFE4" stroke-width="66" stroke-linecap="round" stroke-linejoin="round"/><circle cx="282" cy="742" r="48" fill="#F4EFE4"/><circle cx="282" cy="282" r="48" fill="#F4EFE4"/><circle cx="742" cy="742" r="48" fill="#F4EFE4"/><circle cx="742" cy="282" r="60" fill="#221A39" stroke="#F2A950" stroke-width="24"/><circle cx="742" cy="282" r="15" fill="#F2A950"/></svg>
        <span>GitNomad</span>
      </a>
      <div class="nav-links">
        <a class="hide-sm" href="{{ '/docs/' | relative_url }}">Docs</a>
        <a class="hide-sm" href="https://github.com/DeamosV1415/gitnomad">GitHub</a>
        <a class="nav-cta" href="https://play.google.com/store/apps/details?id=dev.gitnomad.app">Get the app</a>
      </div>
    </div>
  </nav>

  <main class="doc">
    <div class="crumb"><a href="{{ '/' | relative_url }}">Home</a> · <a href="{{ '/docs/' | relative_url }}">Docs</a></div>
    {{ content }}
  </main>

  <footer>
    <div class="foot-in">
      <span class="mono">© GitNomad</span>
      <span>
        <a href="{{ '/docs/' | relative_url }}">Docs</a>
        <a href="{{ '/legal/privacy/' | relative_url }}">Privacy</a>
        <a href="{{ '/legal/terms/' | relative_url }}">Terms</a>
        <a href="https://github.com/DeamosV1415/gitnomad">GitHub</a>
      </span>
    </div>
  </footer>
</body>
</html>
